<!--PLANTILLA PARA MOSTRAR EL MENÚ DEL ESTUDIANTE-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Menú del Estudiante</title>
        <!--CSS-->
        <style>
            body{
                background-color: rgb(164, 159, 241);
                text-align: center;
            }
            h1{
                font-family: Arial, Helvetica, sans-serif;
            }
            h2{
                text-align: left;
                font-size: medium;
                font-family: Arial, Helvetica, sans-serif;
            }
            .list{
                text-align: left;
            }
            .button{
                color: white;
                font-size: 11px;
                margin: 2px;
                cursor: pointer;
                font-family: "Consolas";
                width: 30px;
                background-color: rgb(0, 100, 100);
            }
            .bc{
                background-color: rgb(150, 0, 0);
                width: 55px;
                height: 23px;
            }
            label{
                font-family: 'Courier New', Courier, monospace;
            }
        </style>
    </head>

    <body>
        <h1> ¿Qué quieres consultar?</h1>
        <h2>ESTUDIANTE</h2>
        <!--Lista-->
        <ul class="list">
            <li>Nombre: {{ info[0][0] }}</li>
            <li>Edad: {{ info[0][1] }}</li>
            <li>Usuario: {{ info[0][2] }}</li>
            <li>Carrera: {{ carrera }}</li>
            <li>Semestre: {{ info[0][3] }}</li>
            <li>Grupo: {{ info[0][4] }}</li>
        </ul>
        <!--Botón materias-->
        <br>
        <label>Materias y Calificaciones:</label>
        <a href="{{ url_for('show_subjects_grades') }}">
            <button class = "button">Ir</button>
        </a>
        <!--Botón promedio-->
        <br>
        <br>
        <label>Promedio actual:</label>
        <a href="{{ url_for('show_average') }}">
            <button class = "button">Ir</button>
        </a>
        <!--Botón peores calificaiones-->
        <br>
        <br>
        <label>Peor(es) Calificación(es):</label>
        <a href="{{ url_for('show_worst_grades') }}">
            <button class = "button">Ir</button>
        </a>
        <!--Botón estado actual-->
        <br>
        <br>
        <label>Estado Actual:</label>
        <a href="{{ url_for('show_status') }}">
            <button class = "button">Ir</button>
        </a>
        <br>
        <br>
        <!--Botón de cerrar sesión-->
        <label>Cerrar sesión:</label>
        <a href="{{ url_for('logout') }}">
            <button class = "button bc">Cerrar</button>
        </a>
    </body>
</html>
