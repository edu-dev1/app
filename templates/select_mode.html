<!--PLANTILLA PARA SELECCIONAR EL MODO DE MAESTRO O ESTUDIANTE-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Modo</title>
        <!--<link rel="stylesheet" href="{{ url_for('static', filename='style_register.css') }}">-->

        <!--CSS-->
        <style>
            body{
                background-color: rgb(164, 159, 241);
                text-align: center;
                font-size: 16px;
            }
            h1{
                font-family: cursive;
            }
            .button{
                border: none;
                color: white;
                padding: 15px 20px;
                font-size: 16px;
                margin: 4px;
                cursor: pointer;
                font-family: "Consolas";
            }

            .button1 {background-color: #008CBA;}
            .button2 {background-color: #03c50d;}
        </style>
    </head>

    <body>
        <h1> ¿Eres maestro o estudiante?</h1>
        
        <br>
        <p>Elige tu modo de inicio de sesión:</p>

        <form method="POST" class = "formulario">
            <!--Botón maestro-->
            <button class = "button button1" type = "submit" value = "teacher" name = "mode">MAESTRO</button>
            <!--Botón estudiante-->
            <button class = "button button2" type = "submit" value = "student" name = "mode">ESTUDIANTE</button>
        </form> 
    </body>
</html>
