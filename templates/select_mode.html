<!--PLANTILLA PARA SELECCIONAR EL MODO DE MAESTRO O ESTUDIANTE-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Modo</title>
        <!--CSS-->
        <style>
            body{
                background-color: rgb(164, 159, 241);
                text-align: center;
                font-size: 16px;
            }
            h1{
                font-family: Arial, Helvetica, sans-serif;
            }
            .button{
                color: white;
                padding: 15px 20px;
                font-size: 16px;
                margin: 4px;
                cursor: pointer;
                font-family:Arial, Helvetica, sans-serif;
                width: 150px;
                background-color: rgb(15, 100, 100);
            }

            label{
                font-family:Arial, Helvetica, sans-serif;
                font-size: 15px;
            }
        </style>
    </head>

    <body>
        <h1> ¿Eres maestro o estudiante?</h1>
        <br>
        <label>Elige tu modo de inicio de sesión:</label>
        <br>
        <br>
        <form method="POST" class = "formulario">
            <!--Botón maestro-->
            <button class = "button" type = "submit" value = "teacher" name = "mode">MAESTRO</button>
            <!--Botón estudiante-->
            <button class = "button" type = "submit" value = "student" name = "mode">ESTUDIANTE</button>
        </form> 
    </body>
</html>
